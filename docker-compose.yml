name: fotoassistant

services:
  photo-assistant:
    build:
      context: .
      dockerfile: Dockerfile
    image: photo-assistant:latest
    container_name: photo-assistant
    environment:
      # Для GUI на Linux: export DISPLAY=:0 и смонтируйте /tmp/.X11-unix (см. README).
      DISPLAY: ${DISPLAY:-}
      # 1 (по умолчанию) — xvfb; 0 — реальный DISPLAY из хоста.
      PHOTOASSISTANT_HEADLESS: ${PHOTOASSISTANT_HEADLESS:-1}
    volumes:
      # Код и данные с хоста (результаты сортировки остаются в выбранной папке на машине).
      - ./:/app
    working_dir: /app
    stdin_open: true
    tty: true
