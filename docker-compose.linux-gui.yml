name: fotoassistant

# Подключение к X11 на Linux (окно Tk на экране хоста).
# Пример: xhost +local:docker && PHOTOASSISTANT_HEADLESS=0 DISPLAY=$DISPLAY \
#   docker compose -f docker-compose.yml -f docker-compose.linux-gui.yml run --rm photo-assistant

services:
  photo-assistant:
    environment:
      PHOTOASSISTANT_HEADLESS: "0"
      DISPLAY: ${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host
