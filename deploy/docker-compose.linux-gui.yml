name: fotoassistant

# Пример из корня репозитория:
# xhost +local:docker && PHOTOASSISTANT_HEADLESS=0 DISPLAY=$DISPLAY \
#   docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.linux-gui.yml run --rm photo-assistant

services:
  photo-assistant:
    environment:
      PHOTOASSISTANT_HEADLESS: "0"
      DISPLAY: ${DISPLAY}
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
    network_mode: host
