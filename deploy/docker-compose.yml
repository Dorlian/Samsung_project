name: fotoassistant

services:
  photo-assistant:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: photo-assistant:latest
    container_name: photo-assistant
    environment:
      DISPLAY: ${DISPLAY:-}
      PHOTOASSISTANT_HEADLESS: ${PHOTOASSISTANT_HEADLESS:-1}
    volumes:
      - ../:/app
    working_dir: /app
    stdin_open: true
    tty: true
